              - generic [ref=e311]:
                - 'heading "2026.4.15: # 套餐价格调整通知" [level=2] [ref=e312]':
                  - text: "2026.4.15:"
                  - text: "# 套餐价格调整通知"
                - paragraph [ref=e313]: 迫于政策影响和运营环境恶劣，为了保证持续提供优质的服务和品牌良性运营，自2026年5月15日起 所有套餐价格普涨10%-30%，已购套餐不受影响。
                - paragraph [ref=e314]: 价格调整后请不要尝试同客服索要优惠码，值此特殊时期我们已经做到业内top级别的稳定，稳定的承诺背后是数倍于大部分友商的成本，还望理解，谢谢。
                - paragraph [ref=e315]: 2026.5.15 UPDATE：价格调整已完成，感谢诸君信任，我们将持续保持稳定和高速的服务，不负厚望🍻。
                - heading "2026.2.9:" [level=2] [ref=e316]
                - heading "1. 节点如果不可用，请重新复制并导入订阅；" [level=4] [ref=e317]:

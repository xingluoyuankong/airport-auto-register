                  - strong [ref=e334]: 如果节点下方显示是“Vless/None”或者提示⚠️ ，请更新小火箭或者重新下载并导入；
                - heading "---" [level=2] [ref=e335]
                - heading "2026.2.10:" [level=2] [ref=e336]
                - heading "#道歉声明与补偿措施" [level=2] [ref=e337]
                - paragraph [ref=e338]: 北京时间 2 月 8 日上午 9:00 起，我们的服务遭遇攻击，直至当日下午 3:30 逐步恢复，在此期间服务处于间断不可用状态。
                - paragraph [ref=e339]: 在 2 月 8 日当天，我们仓促地对节点协议进行了更新。由于准备不足、评估不充分，该次更新未能提前适配主流客户端，也没有准备可立即切换的备用方案，导致包括 Clash for Windows、Clash X Pro、V2RayN、V2RayNG、Surge、Quantumult-X在内的客户端出现所有节点均不可用的情况。
                - paragraph [ref=e340]:
                  - text: 此外，我们最早使用的订阅链接域名因不可抗因素受到限制，导致部分用户无法直接刷新订阅内容。
                  - text: 这进一步放大了本次事故的影响范围，使部分用户即使在节点逐步恢复后，仍然无法第一时间完成配置更新。
                - paragraph [ref=e341]: 以上问题叠加，最终造成大部分用户端实际不可用时间长达约 1 天，并且不排除仍存在尚未得到我们帮助而无法使用的用户。
                - paragraph [ref=e342]: 这是我们自服务上线以来最严重的一次事故。
                - paragraph [ref=e343]:
                  - text: 目前攻击已经缓解。对于内核支持的客户端我们已经做了适配，内核不支持的客户端包括
                  - strong [ref=e344]: Clash for Windows、Clash X Pro、V2RayN(6.17以下版本)、Surge等，需要您更新客户端版本或者更换客户端使用。
                - paragraph [ref=e345]: 给大家带来的困扰与不便，我们深感愧疚，也真诚地向每一位受影响的用户致歉, 并向受影响用户提供补偿七折优惠码：
                - heading "DUCKDONTLIE" [level=2] [ref=e346]
                - paragraph [ref=e347]:
                  - text: 优惠码使用说明
                  - text: 1. 该优惠码仅对
                  - strong [ref=e348]: 2026 年 2 月 10 日
                  - text: 之前注册的用户有效
                  - text: 2. 每位符合条件的用户仅可使用一次
                  - text: 3. 优惠码永久有效，无论何时使用都可以，不设使用截止时间
                  - text: 4. 优惠码适用于商店内所有商品，包括：月付套餐/半年付套餐/年付套餐/流量加油包
                - paragraph [ref=e349]:
                  - text: 这次事故暴露了我们在应急预案、变更流程以及客户端兼容性评估上的严重不足。
                  - text: 我们已经开始对相关流程进行全面复盘和整改，以避免类似问题再次发生。
                  - text: 再一次，抱歉，也感谢诸位的理解、包容与继续信任。
                - heading "---" [level=2] [ref=e350]:
                  - strong [ref=e351]: "---"
